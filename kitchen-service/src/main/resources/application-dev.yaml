server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:${KITCHEN_DB_PORT:5432}/${KITCHEN_DB_NAME:kitchendb}
    username: ${KITCHEN_DB_USER:kitchen_user}
    password: ${KITCHEN_DB_PASSWORD:kitchen_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
