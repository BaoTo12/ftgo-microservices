spring:
  datasource:
    url: jdbc:postgresql://localhost:${KITCHEN_DB_PORT:5432}/${KITCHEN_DB_NAME:kitchendb}
    username: ${KITCHEN_DB_USER:kitchen_user}
    password: ${KITCHEN_DB_PASSWORD:kitchen_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8070/eureka/
  instance:
    prefer-ip-address: true
